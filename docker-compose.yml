version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: helpdesk-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - helpdesk-network
    depends_on:
      - db
      - redis

  db:
    image: postgres:18
    container_name: helpdesk-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: helpdesk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - db-data:/var/lib/postgresql
    networks:
      - helpdesk-network

  redis:
    image: redis:latest
    container_name: helpdesk-redis
    restart: unless-stopped
    networks:
      - helpdesk-network

  nginx:
    image: nginx:latest
    container_name: helpdesk-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www/html
    ports:
      - "80:80"
    networks:
      - helpdesk-network
    depends_on:
      - app

networks:
  helpdesk-network:
    driver: bridge

volumes:
  db-data:
