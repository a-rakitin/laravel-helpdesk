services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: helpdesk-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - helpdesk-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:18
    container_name: helpdesk-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: helpdesk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - db-data:/var/lib/postgresql
    networks:
      - helpdesk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d helpdesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: helpdesk-redis
    restart: unless-stopped
    networks:
      - helpdesk-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:latest
    container_name: helpdesk-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certbot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./:/var/www/html
    ports:
      - "80:80"
      - "443:443"
    networks:
      - helpdesk-network
    depends_on:
      - app

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: helpdesk-worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    volumes:
      - ./:/var/www/html
    networks:
      - helpdesk-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  helpdesk-network:
    driver: bridge

volumes:
  db-data:
